name: amana_pos
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^9.2.1

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.1

  # UI / Assets
  flutter_svg: ^2.0.10+1
  flutter_animate: ^4.5.2

  # Network
  dio: ^5.5.0+1
  mime: ^2.0.0

  # Utils
  intl: ^0.20.2
  fpdart: ^1.1.0
  collection: ^1.19.1
  uuid: ^4.5.1

  # Image / Permissions
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Offline-first MVP
  sqflite: ^2.4.2        # was exact pin "2.4.2" — allows patch releases
  path: ^1.9.1
  connectivity_plus: ^7.0.0  # was ^6.1.4 — allows the current 7.x line

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true